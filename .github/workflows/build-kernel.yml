name: Build P0.4.2 Kernel
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: sudo apt-get install -y build-essential flex bison bc libelf-dev gcc-multilib

      - name: Fetch kernel source
        run: |
          curl -L "https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.8.12.tar.xz" -o /tmp/linux.tar.xz
          tar xf /tmp/linux.tar.xz -C /tmp

      - name: Configure kernel
        run: |
          cd /tmp/linux-6.8.12
          make ARCH=x86 allnoconfig KCONFIG_ALLCONFIG=$GITHUB_WORKSPACE/kernel-p0.4.fragment
          make ARCH=x86 olddefconfig
          grep -E "CONFIG_SMP|CONFIG_TINY_RCU|CONFIG_HZ=" .config

      - name: Build kernel
        run: |
          cd /tmp/linux-6.8.12
          make ARCH=x86 -j$(nproc) bzImage
          ls -lh arch/x86/boot/bzImage
          ls -lh vmlinux

      - name: Upload bzImage
        uses: actions/upload-artifact@v4
        with:
          name: p04-bzimage
          path: /tmp/linux-6.8.12/arch/x86/boot/bzImage

      - name: Upload vmlinux (symbols)
        uses: actions/upload-artifact@v4
        with:
          name: p04-vmlinux
          path: /tmp/linux-6.8.12/vmlinux

      - name: Upload System.map
        uses: actions/upload-artifact@v4
        with:
          name: p04-system-map
          path: /tmp/linux-6.8.12/System.map
